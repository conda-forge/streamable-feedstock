schema_version: 1

context:
  name: streamable
  version: "2.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ebonnal/streamable/archive/refs/tags/v${{ version }}.tar.gz
  sha256: dec03c6f4b2d7a7ad6decf773bee06c847f07e7628bd0787c0967d719729ce27

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - streamable
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Stream-like manipulation of iterables
  license: Apache-2.0
  license_file: LICENSE
  homepage: http://github.com/ebonnal/streamable

extra:
  recipe-maintainers:
    - thewchan
